<!DOCTYPE html>
<html lang="en" data-theme="nord-dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Do-able · Home Page Concept</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="homepage-concept.css">
</head>
<body>

<div class="desktop">
  <div class="dialog" id="mainDialog">
    <div class="dialog-titlebar" id="titlebar">
      <svg class="titlebar-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span class="dialog-title" id="dialogTitle">Do-able</span>
      <button class="dialog-close" id="closeBtn" aria-label="Close dialog">&#x00D7;</button>
    </div>
    <div class="dialog-body">
      <!-- Quick-add (always visible) -->
      <div class="quick-area">
        <input type="text" class="win-input quick-input" id="taskInput" placeholder='e.g. "Buy milk tomorrow high"'>
        <div class="quick-buttons">
          <button class="btn-win btn-advanced" id="toggleAdvanced">
            <span class="arrow" id="advancedArrow">&#x25B6;</span> Advanced
          </button>
          <a href="/" class="btn-win btn-launch">Go to Main App</a>
          <button class="btn-win btn-icon" id="themeSwitch" aria-label="Toggle theme">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
        </div>
      </div>

      <!-- Advanced panel (hidden by default) -->
      <div class="advanced-panel closed" id="advancedPanel">
        <div class="field-row">
          <label class="field-label">Title</label>
          <input type="text" class="win-input" id="taskTitle" placeholder="Task title">
        </div>
        <div class="field-row">
          <label class="field-label">Description</label>
          <textarea class="win-input" id="taskDesc" rows="3" placeholder="Optional description"></textarea>
        </div>
        <div class="field-row">
          <label class="field-label">Priority</label>
          <div class="prio-group" id="prioGroup">
            <button class="prio-btn" data-prio="high">High</button>
            <button class="prio-btn active" data-prio="medium">Medium</button>
            <button class="prio-btn" data-prio="low">Low</button>
          </div>
        </div>
        <div class="field-row row-duo">
          <div class="field-half">
            <label class="field-label">Due Date</label>
            <input type="date" class="win-input" id="taskDue">
          </div>
          <div class="field-half">
            <label class="field-label">Start Date</label>
            <input type="date" class="win-input" id="taskStart">
          </div>
        </div>
        <div class="field-row row-duo">
          <div class="field-half">
            <label class="field-label">Time</label>
            <input type="time" class="win-input" id="taskTime" style="max-width:130px">
          </div>
          <div class="field-half">
            <label class="field-label">Category</label>
            <select class="win-input" id="taskCategory">
              <option value="">None</option>
              <option>Work</option>
              <option>Personal</option>
              <option>Health</option>
              <option>Finance</option>
              <option>Learning</option>
            </select>
          </div>
        </div>
        <div class="field-row">
          <label class="field-label">Tags</label>
          <input type="text" class="win-input" id="taskTags" placeholder="comma-separated (e.g. urgent, design)">
        </div>
      </div>

      <div class="dialog-actions">
        <button class="btn-win btn-primary" id="addBtn" tabindex="0">Add</button>
        <button class="btn-win" id="cancelBtn" tabindex="0">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Clock widget -->
  <div class="clock-widget" id="clockWidget">
    <div class="clock-body">
      <span class="clock-time" id="clockTime">00:00</span>
    </div>
  </div>

  <!-- Desktop icons -->
  <div class="desktop-icons">
    <div class="desk-icon" id="iconMyComputer" title="My Computer">
      <svg class="desk-icon-img" width="32" height="32" viewBox="0 0 48 48" fill="none">
        <rect x="4" y="6" width="40" height="30" rx="1" fill="#808080" stroke="#000" stroke-width="1.5"/>
        <rect x="7" y="9" width="34" height="21" fill="#fff" stroke="#808080" stroke-width="0.5"/>
        <rect x="18" y="36" width="12" height="4" fill="#808080" stroke="#000" stroke-width="1"/>
        <rect x="12" y="40" width="24" height="2" fill="#808080" stroke="#000" stroke-width="1"/>
        <rect x="8" y="10" width="32" height="19" fill="#000080" opacity="0.5"/>
        <circle cx="28" cy="19" r="4" fill="#fff" opacity="0.6"/>
        <rect x="22" y="17" width="8" height="2" fill="#fff" opacity="0.4"/>
      </svg>
      <span class="desk-icon-label">My Computer</span>
    </div>
    <div class="desk-icon" id="iconRecycleBin" title="Recycle Bin">
      <svg class="desk-icon-img" width="32" height="32" viewBox="0 0 48 48" fill="none">
        <path d="M14 14h20v22a3 3 0 0 1-3 3H17a3 3 0 0 1-3-3V14z" fill="#c0c0c0" stroke="#000" stroke-width="1.5"/>
        <rect x="11" y="11" width="26" height="4" rx="1" fill="#808080" stroke="#000" stroke-width="1"/>
        <rect x="16" y="8" width="16" height="4" rx="1" fill="#c0c0c0" stroke="#000" stroke-width="1"/>
        <rect x="20" y="17" width="2" height="16" fill="#fff" opacity="0.3"/>
        <rect x="24" y="17" width="2" height="16" fill="#fff" opacity="0.3"/>
        <rect x="28" y="17" width="2" height="16" fill="#fff" opacity="0.3"/>
        <path d="M18 14l1-3h10l1 3" stroke="#000" stroke-width="1" fill="none"/>
      </svg>
      <span class="desk-icon-label">Recycle Bin</span>
    </div>
  </div>

  <!-- Desktop context menu -->
  <div class="ctx-menu" id="ctxMenu">
    <div class="ctx-item" data-action="arrange">Arrange Icons</div>
    <div class="ctx-item" data-action="lineup">Line up Icons</div>
    <div class="ctx-separator"></div>
    <div class="ctx-item" data-action="paste">Paste</div>
    <div class="ctx-item" data-action="paste-shortcut">Paste Shortcut</div>
    <div class="ctx-separator"></div>
    <div class="ctx-item" data-action="new">New ><span class="ctx-arrow">&#x25B6;</span></div>
    <div class="ctx-separator"></div>
    <div class="ctx-item" data-action="properties">Properties</div>
  </div>

  <div class="status-bar">
    <span class="status-text">Do-able &middot; build 2026.06 &middot; Phase 1 Prototype</span>
    <span class="status-text" id="statusTheme">Theme: Nord Dark</span>
  </div>
</div>

<script src="homepage-concept.js"></script>
</body>
</html>
